---
# ============================================================
# Backend Deployment — FastAPI (Python) 
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: betmasterx-backend
  namespace: betmasterx
  labels:
    app.kubernetes.io/name: betmasterx
    app.kubernetes.io/component: backend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: betmasterx-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # Zero-downtime deployments
  template:
    metadata:
      labels:
        app: betmasterx-backend
        app.kubernetes.io/component: backend
      annotations:
        # Forces pod restart when configmap changes (optional)
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: betmasterx-backend-sa  # IRSA annotated SA

      # Security context — run as non-root at pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      containers:
        - name: backend
          # Image will be replaced by Helm / CI-CD with ECR URL + sha tag
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/betmasterx-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          # Container-level security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # FastAPI needs /tmp for uploads
            capabilities:
              drop: ["ALL"]

          # Non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: betmasterx-config
          # Sensitive credentials from Secret
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: betmasterx-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_KEY
              valueFrom:
                secretKeyRef:
                  name: betmasterx-secrets
                  key: SUPABASE_KEY
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: betmasterx-secrets
                  key: SUPABASE_SERVICE_KEY
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: betmasterx-secrets
                  key: SECRET_KEY

          # Resource guardrails
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Liveness — restart if app is deadlocked
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness — only send traffic when truly ready
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # Startup probe — give extra time on cold starts
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12   # 60 seconds max startup

      # Spread pods across AZs for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: betmasterx-backend

      terminationGracePeriodSeconds: 30

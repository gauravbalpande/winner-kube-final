---
# ============================================================
# ServiceAccount — Backend IRSA
# Annotated with IAM Role ARN from Terraform output
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: betmasterx-backend-sa
  namespace: betmasterx
  labels:
    app.kubernetes.io/name: betmasterx
    app.kubernetes.io/component: backend
  annotations:
    # ARN from: terraform output backend_irsa_role_arn  (terraform/ECR)
    eks.amazonaws.com/role-arn: arn:aws:iam::040342463442:role/betmasterx-backend-irsa

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: betmasterx-backend-svc
  # namespace: betmasterx
  labels:
    {{- include "betmasterx.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.backend.service.port }}"
    prometheus.io/path: "/metrics"
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "betmasterx.backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
      protocol: TCP

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: betmasterx-frontend-svc
  # namespace: betmasterx
  labels:
    {{- include "betmasterx.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "betmasterx.frontend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.port }}
      protocol: TCP

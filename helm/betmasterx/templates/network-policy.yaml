---
{{- if .Values.networkPolicy.enabled }}
# Default deny all ingress/egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  labels:
    {{- include "betmasterx.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow ALB health checks and external traffic to frontend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
spec:
  podSelector:
    matchLabels:
      app: betmasterx-frontend
  policyTypes:
    - Ingress
  ingress:
    - {}

---
# Allow ALB health checks and external traffic to backend (/api)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-ingress
spec:
  podSelector:
    matchLabels:
      app: betmasterx-backend
  policyTypes:
    - Ingress
  ingress:
    # From frontend pods
    - from:
        - podSelector:
            matchLabels:
              app: betmasterx-frontend
      ports:
        - protocol: TCP
          port: 8000
    # From ALB (health checks + routed traffic)
    - ports:
        - protocol: TCP
          port: 8000

---
# Backend egress: Supabase (443), OTel collector (4317), DNS (53)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress
spec:
  podSelector:
    matchLabels:
      app: betmasterx-backend
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4317
    - ports:
        - protocol: UDP
          port: 53

---
# Frontend egress: backend API (8000), DNS (53)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress
spec:
  podSelector:
    matchLabels:
      app: betmasterx-frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: betmasterx-backend
      ports:
        - protocol: TCP
          port: 8000
    - ports:
        - protocol: UDP
          port: 53
{{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: betmasterx-secrets
  namespace: betmasterx
  labels:
    {{- include "betmasterx.labels" . | nindent 4 }}
type: Opaque
stringData:
  SUPABASE_URL: {{ .Values.secrets.supabaseUrl | quote }}
  SUPABASE_KEY: {{ .Values.secrets.supabaseKey | quote }}
  SUPABASE_SERVICE_KEY: {{ .Values.secrets.supabaseServiceKey | quote }}
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}

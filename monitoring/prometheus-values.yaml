# ============================================================
# Prometheus Helm Values — kube-prometheus-stack
# Namespace: monitoring
# Source: prometheus-community/kube-prometheus-stack
# ============================================================

# Single-replica Prometheus (free-tier friendly)
prometheus:
  prometheusSpec:
    replicas: 1
    retention: 15d
    retentionSize: "8GB"
    
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

    # Scrape all namespaces
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

    # Additional scrape configs for BetMasterX pods
    additionalScrapeConfigs:
      - job_name: betmasterx-backend
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [betmasterx]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

# AlertManager — lightweight internal alerts
alertmanager:
  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"

# Grafana — disabled here, deployed separately
grafana:
  enabled: false

# Node exporter — collect host metrics from worker nodes
nodeExporter:
  enabled: true

# kube-state-metrics — pod/deployment state
kubeStateMetrics:
  enabled: true

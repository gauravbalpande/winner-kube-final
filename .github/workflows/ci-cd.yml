name: CI — BetMasterX (GitOps / ArgoCD)
# ============================================================
# GitOps CI Pipeline — Build & push only; ArgoCD deploys.
#
#   PR    → lint (validate code quality)
#   main  → lint → security-scan → build-push (ECR)
#                                       ↓
#                               ArgoCD Image Updater
#                               detects new ECR tag
#                                       ↓
#                               Commits tag to git
#                                       ↓
#                          ArgoCD Auto Syncs → K8s
# ============================================================

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_REPO: betmasterx-backend
  FRONTEND_REPO: betmasterx-frontend

# ============================================================
jobs:

  # ----------------------------------------------------------
  # Job 1 — Lint & Validate
  # ----------------------------------------------------------
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # ---- Backend (Python / flake8) ----
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: pip install -r backend/requirements.txt flake8

      - name: Lint backend (flake8)
        run: |
          cd backend
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exclude=__pycache__,.env

      # ---- Frontend (Node / ESLint) ----
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Lint frontend
        run: cd frontend && npm run lint || true   # Soft-fail until eslint config is added

      # ---- Helm chart validation ----
      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Helm lint (all environments)
        run: |
          helm lint helm/betmasterx/ -f helm/betmasterx/values.yaml
          helm lint helm/betmasterx/ -f helm/betmasterx/values.yaml \
                    -f helm/betmasterx/values-staging.yaml
          helm lint helm/betmasterx/ -f helm/betmasterx/values.yaml \
                    -f helm/betmasterx/values-production.yaml

      # ---- ArgoCD YAML validation ----
      - name: Validate ArgoCD manifests
        run: |
          python3 -c "
          import yaml, glob, sys
          files = glob.glob('argocd/**/*.yaml', recursive=True)
          errors = []
          for f in sorted(files):
              try:
                  list(yaml.safe_load_all(open(f)))
                  print(f'  OK  {f}')
              except Exception as e:
                  errors.append(f)
                  print(f'FAIL {f}: {e}')
          sys.exit(1 if errors else 0)
          "

  # ----------------------------------------------------------
  # Job 2 — Security Scan (Trivy)
  # Runs only on push to main / semver tags
  # ----------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      # ---- Backend scan ----
      - name: Build backend image
        run: docker build -t betmasterx-backend:scan ./backend

      - name: Trivy — Backend
        id: trivy-backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "betmasterx-backend:scan"
          format: "sarif"
          output: "trivy-backend.sarif"
          exit-code: "0"            # Warn only — don't block on upstream CVEs
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # ---- Frontend scan ----
      - name: Build frontend image
        run: docker build -t betmasterx-frontend:scan --target production ./frontend

      - name: Trivy — Frontend
        id: trivy-frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "betmasterx-frontend:scan"
          format: "sarif"
          output: "trivy-frontend.sarif"
          exit-code: "0"            # Warn only — don't block on upstream CVEs
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # ---- IaC scan (warn only) ----
      - name: Trivy — IaC (Terraform + K8s)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      # ---- Upload SARIF results ----
      - name: Upload backend SARIF
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-backend.sarif"
          category: "trivy-backend"

      - name: Upload frontend SARIF
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-frontend.sarif"
          category: "trivy-frontend"

      - name: Scan summary
        run: echo "✅ Security scans completed — results uploaded to GitHub Security tab"

  # ----------------------------------------------------------
  # Job 3 — Build & Push to ECR
  #
  # Tags: latest, sha-<SHORT_SHA>, and v*.*.* (on semver tags)
  # ArgoCD Image Updater picks up the new tag automatically.
  # ----------------------------------------------------------
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push'
    permissions:
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: meta
        run: |
          SHA_TAG="sha-$(git rev-parse --short HEAD)"
          echo "sha-tag=${SHA_TAG}" >> $GITHUB_OUTPUT

          # Build the tag lists (one per line for docker/build-push-action)
          BACKEND_TAGS="${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest"
          BACKEND_TAGS="${BACKEND_TAGS}
          ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${SHA_TAG}"

          FRONTEND_TAGS="${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest"
          FRONTEND_TAGS="${FRONTEND_TAGS}
          ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${SHA_TAG}"

          # Append semver tag if this is a version release
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            BACKEND_TAGS="${BACKEND_TAGS}
          ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${VERSION}"
            FRONTEND_TAGS="${FRONTEND_TAGS}
          ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${VERSION}"
          fi

          # Write multi-line outputs
          echo "backend-tags<<EOF" >> $GITHUB_OUTPUT
          echo "${BACKEND_TAGS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "frontend-tags<<EOF" >> $GITHUB_OUTPUT
          echo "${FRONTEND_TAGS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      # ---- Backend ----
      - name: Build & Push — Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.backend-tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Frontend ----
      - name: Build & Push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.frontend-tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Optional: nudge ArgoCD ----
      - name: Notify ArgoCD (optional speedup)
        if: github.ref == 'refs/heads/main'
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          if [ -n "${ARGOCD_SERVER}" ] && [ -n "${ARGOCD_AUTH_TOKEN}" ]; then
            curl -sf -X POST \
              -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
              "https://${ARGOCD_SERVER}/api/v1/applications/betmasterx-dev/refresh" \
              && echo "ArgoCD refresh triggered" \
              || echo "⚠️  Refresh failed — Image Updater will still pick up the tag"
          else
            echo "ArgoCD secrets not configured — skipping"
          fi

      # ---- Summary ----
      - name: CI Summary
        run: |
          echo "## ✅ CI Passed — Images Pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`${{ steps.meta.outputs.sha-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ steps.meta.outputs.sha-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ArgoCD** will detect the new tag via Image Updater and sync automatically." >> $GITHUB_STEP_SUMMARY